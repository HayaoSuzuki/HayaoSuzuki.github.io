site_name: Hayao Suzuki
site_url: https://hayaosuzuki.github.io/
site_author: Hayao Suzuki
repo_url: https://github.com/HayaoSuzuki/HayaoSuzuki.github.io
repo_name: HayaoSuzuki/HayaoSuzuki.github.io

theme:
  name: material
  language: ja
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ライトモードに切り替え

nav:
  - ホーム: index.md
  - 履歴書: cv.md
  - 業績:
      - 翻訳・監訳・監修・査読: works/translations.md
      - 外部発表: works/presentations.md
  - エッセイ:
      - 一覧: essays/index.md
  - 技術記事:
      - 一覧: articles/index.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
